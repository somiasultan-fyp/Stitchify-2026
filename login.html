<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login - Tailoring Services</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --primary-bg: #212529;
  --accent-color: #1B2A4A;
  --copyright-bg: #575a5b;
  --text-white: #ffffff;
}

body {
  /* background: linear-gradient(135deg, var(--primary-bg) 0%, var(--accent-color) 100%); */
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-wrapper {
  width: 450px;
  max-width: 95%;
  background-color: var(--text-white);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.logo-container {
  background: linear-gradient(135deg, var(--accent-color), var(--primary-bg));
  padding: 40px;
  text-align: center;
  border-bottom: 3px solid var(--copyright-bg);
}

.logo-image {
  width: 100px;
  height: 100px;
  margin: 0 auto;
  display: block;
  object-fit: contain;
  border-radius: 50%;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

.form-container {
  padding: 40px;
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.login-header h2 {
  color: var(--accent-color);
  font-weight: 700;
  font-size: 28px;
  margin-bottom: 8px;
}

.login-header p {
  color: var(--copyright-bg);
  font-size: 14px;
}

.form-label {
  color: var(--primary-bg);
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 14px;
}

.form-control {
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px 15px;
  color: var(--primary-bg);
  background-color: #f8f9fa;
  transition: all 0.3s ease;
  font-size: 15px;
}

.form-control:focus {
  border-color: var(--accent-color);
  box-shadow: 0 0 0 0.25rem rgba(14, 24, 48, 0.15);
  background-color: var(--text-white);
}

.form-control.is-invalid {
  border-color: #dc3545;
}

.btn-login {
  background: linear-gradient(135deg, var(--accent-color), var(--primary-bg));
  color: var(--text-white);
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-weight: 600;
  font-size: 16px;
  width: 100%;
  transition: all 0.3s ease;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(14, 24, 48, 0.4);
}

.password-toggle {
  position: relative;
}

.password-toggle .toggle-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--copyright-bg);
  opacity: 0.6;
  display: none;
  font-size: 1.1rem;
  transition: opacity 0.3s ease;
}

.password-toggle .toggle-icon:hover {
  opacity: 1;
}

.password-toggle .toggle-icon.show {
  display: block;
}

.error-text {
  color: #dc3545;
  font-size: 0.875rem;
  margin-top: 5px;
  display: block;
}

.forgot-password {
  text-align: right;
  margin-top: 10px;
  margin-bottom: 20px;
}

.forgot-password a {
  color: var(--copyright-bg);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.3s ease;
}

.forgot-password a:hover {
  color: var(--accent-color);
  text-decoration: underline;
}

.register-link {
  text-align: center;
  margin-top: 25px;
  padding-top: 25px;
  border-top: 1px solid #e0e0e0;
  color: var(--copyright-bg);
  font-size: 14px;
}

.register-link a {
  color: var(--accent-color);
  text-decoration: none;
  font-weight: 600;
}

.register-link a:hover {
  text-decoration: underline;
}

.btn-social {
  flex: 1;
  padding: 12px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  background-color: var(--text-white);
  color: var(--primary-bg);
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: pointer;
}

.btn-social:hover {
  border-color: var(--accent-color);
  background-color: #f8f9fa;
  transform: translateY(-2px);
}

.btn-social i {
  margin-right: 5px;
}

.remember-me {
  display: flex;
  align-items: center;
  margin-top: 15px;
}

.remember-me input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-right: 8px;
  cursor: pointer;
  accent-color: var(--accent-color);
}

.remember-me label {
  color: var(--copyright-bg);
  font-size: 14px;
  cursor: pointer;
  margin: 0;
}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="logo-container">
    <img src="logo.png" alt="Tailoring Services Logo" class="logo-image">
  </div>

  <div class="form-container">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Login to your account</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input id="email" class="form-control" placeholder="example@gmail.com" type="email" required>
        <span id="emailError" class="error-text"></span>
      </div>

      <div class="mb-3 password-toggle">
        <label for="password" class="form-label">Password</label>
        <input id="password" class="form-control" placeholder="Enter your password" type="password" required>
        <i id="togglePassword" class="fas fa-eye toggle-icon" title="Show/hide password" role="button" aria-label="Toggle password visibility"></i>
        <span id="passwordError" class="error-text"></span>
      </div>

      <div class="d-flex justify-content-between align-items-center">
        <div class="remember-me">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>
        <div class="forgot-password">
          <a href="#" id="forgotPasswordLink">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="Registration.html">Sign Up</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
const loginForm = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const emailError = document.getElementById('emailError');
const passwordError = document.getElementById('passwordError');
const forgotPasswordLink = document.getElementById('forgotPasswordLink');

// Email validation with detailed feedback
function validateEmail(email) {
  emailError.textContent = '';
  
  if (!email) return false;
  
  if (!email.includes('@')) {
    emailError.textContent = 'Email must contain @ symbol';
    return false;
  }
  
  const parts = email.split('@');
  if (parts.length !== 2 || !parts[0] || !parts[1]) {
    emailError.textContent = 'Invalid email format. Use: example@domain.com';
    return false;
  }
  
  if (!parts[1].includes('.')) {
    emailError.textContent = 'Email must contain a domain (e.g., gmail.com)';
    return false;
  }
  
  const domainParts = parts[1].split('.');
  if (domainParts.some(part => !part)) {
    emailError.textContent = 'Invalid domain format';
    return false;
  }
  
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    emailError.textContent = 'Please enter a valid email address';
    return false;
  }
  
  return true;
}

emailInput.addEventListener('blur', () => {
  if (emailInput.value.trim()) {
    validateEmail(emailInput.value.trim());
  }
});

emailInput.addEventListener('input', () => {
  if (emailError.textContent) {
    validateEmail(emailInput.value.trim());
  }
});

// Password toggle functionality
passwordInput.addEventListener('input', () => {
  const value = passwordInput.value;
  
  if (value.length > 0) {
    togglePassword.classList.add('show');
  } else {
    togglePassword.classList.remove('show');
    passwordInput.setAttribute('type', 'password');
    togglePassword.classList.remove('fa-eye-slash');
    togglePassword.classList.add('fa-eye');
  }
  
  passwordError.textContent = '';
});

togglePassword.addEventListener('click', () => {
  const currentType = passwordInput.getAttribute('type');
  if (currentType === 'password') {
    passwordInput.setAttribute('type', 'text');
    togglePassword.classList.remove('fa-eye');
    togglePassword.classList.add('fa-eye-slash');
  } else {
    passwordInput.setAttribute('type', 'password');
    togglePassword.classList.remove('fa-eye-slash');
    togglePassword.classList.add('fa-eye');
  }
});

// Forgot password link
forgotPasswordLink.addEventListener('click', (e) => {
  e.preventDefault();
  alert('Password reset functionality coming soon!\n\nPlease contact support for assistance.');
});

// Form submission
loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  emailError.textContent = '';
  passwordError.textContent = '';
  
  let isValid = true;
  
  // Validate email
  if (!validateEmail(emailInput.value.trim())) {
    emailInput.classList.add('is-invalid');
    isValid = false;
  } else {
    emailInput.classList.remove('is-invalid');
  }
  
  // Validate password
  if (!passwordInput.value.trim()) {
    passwordError.textContent = 'Password is required';
    passwordInput.classList.add('is-invalid');
    isValid = false;
  } else {
    passwordInput.classList.remove('is-invalid');
  }
  
  if (isValid) {
    const loginData = {
      email: emailInput.value.trim(),
      password: passwordInput.value,
      rememberMe: document.getElementById('rememberMe').checked
    };
    
    console.log('Login Data:', loginData);
    alert('Login successful!\n\nEmail: ' + loginData.email + '\nRemember me: ' + (loginData.rememberMe ? 'Yes' : 'No'));
    
    // Redirect or process login here
    // window.location.href = 'dashboard.html';
  }
});
</script>
</body>
</html>
